name: CI Pipeline

on:
  push:
    branches:
      - '**'
  pull_request:
    branches:
      - '**'

jobs:
  frontend-ci:
    name: Frontend CI
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
      # -------------------------------------------------------
      # Etapa 1. Checkout
      # -------------------------------------------------------
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          # Requerido por SonarQube para calcular blame y métricas de cobertura
          fetch-depth: 0

      # -------------------------------------------------------
      # Etapa 2. Setup del entorno
      # -------------------------------------------------------
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      # -------------------------------------------------------
      # Etapa 3. Instalación de dependencias
      # -------------------------------------------------------
      - name: Install dependencies
        run: npm ci

      # -------------------------------------------------------
      # Etapa 4. Pruebas unitarias (Jest)
      # -------------------------------------------------------
      - name: Run unit tests
        run: npm test -- --coverage --watchAll=false
        env:
          CI: true

      # -------------------------------------------------------
      # Etapa 5. Análisis estático (ESLint)
      # -------------------------------------------------------
      - name: Run ESLint
        run: npx eslint src --max-warnings=0

      # -------------------------------------------------------
      # Etapa 6. SonarQube Cloud Scan
      # -------------------------------------------------------
      - name: SonarQube Cloud Scan
        uses: SonarSource/sonarcloud-github-action@v3
        with:
          projectBaseDir: frontend
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
